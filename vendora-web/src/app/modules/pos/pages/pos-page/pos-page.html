<div class="pos-container">

  <!-- PRODUCTOS -->
  <div class="products-panel">

    <div class="search">
      <input
        #searchInput
        type="text"
        placeholder="Buscar producto..."
        [(ngModel)]="searchTerm"
        (input)="filterProducts()"
        (keydown.enter)="addFirstProduct()"
      />
    </div>

    <div class="product-list">

      <div
        class="product-row"
        *ngFor="let product of filteredProducts"
        (click)="addProduct(product)"
        >

        <span class="product-name">

        {{product.name}}

        <span class="product-code">
        ({{product.code}})
        </span>

        </span>

        <span class="product-stock">

        Stock: {{product.stock}}

        </span>

        <span class="product-price">

        ${{product.price}}

        </span>

      </div>

</div>

  </div>



  <!-- TICKET -->
  <div class="ticket-panel">

    <h3>Ticket</h3>

    <div class="ticket-items">

      <div
        class="ticket-row"
        *ngFor="let item of ticket; let i = index"
        (click)="selectTicketItem(i)"
        [class.selected]="selectedTicketIndex === i"
        >

        <span>
        {{item.name}} x{{item.qty}}
        </span>

        <span>
        ${{item.qty * item.price}}
        </span>

        <button
        class="remove"
        (click)="removeItem(i); $event.stopPropagation()"
        >
        ✕
        </button>

      </div>

    </div>


    <div class="total-section">

      <div class="total-title">Total</div>

      <div class="total">
        ${{getTotal()}}
      </div>

    </div>


    <div class="payments">

      <button class="pay green">Efectivo</button>

      <button class="pay blue">Tarjeta</button>

      <button class="pay purple">Descuento</button>

    </div>

  </div>

</div>

<div class="modal-backdrop" *ngIf="weightModal">

<div class="modal">

<h3>{{selectedProduct?.name}}</h3>

<p>Precio: ${{selectedProduct?.price}} / kg</p>


<label>Kilos</label>

<input
type="number"
step="0.001"
[(ngModel)]="kilos"
(input)="updateFromKilos()"
>


<label>Monto ($)</label>

<input
type="number"
step="0.01"
[(ngModel)]="amount"
(input)="updateFromAmount()"
(keydown.enter)="confirmWeight()"
>


<button (click)="confirmWeight()">

Agregar al Ticket

</button>

</div>
<button class="cancel" (click)="closeWeightModal()">
Cancelar
</button>
</div>
